<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>إرسال دعوة تسجيل مورد — مجموعة الذيابي</title>
<style>
  :root{--navy:#16243d;--gold:#c2a063;--gold-2:#a37f43;--ink:#1b2333;--muted:#5d6b80;--line:#e2e6ee;--bg:#f2f4f8;--ok:#1c7a4d;--err:#b4453f}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Segoe UI',Tahoma,Arial,sans-serif;line-height:1.6;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 14px}
  .card{width:100%;max-width:520px;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 50px rgba(20,30,50,.10);overflow:hidden}
  .head{background:linear-gradient(120deg,#0f1a2e,#16243d 55%,#1d2f4d);padding:26px 28px;text-align:center;color:#f6efe0}
  .head img{height:40px;width:auto;display:block;margin:0 auto 10px;filter:brightness(0) invert(1);opacity:.95}
  .head h1{margin:0;font-size:18px;font-weight:800}
  .head .sub{font-size:12px;color:var(--gold);margin-top:4px;letter-spacing:.4px}
  .body{padding:24px 28px 28px}
  label{display:block;font-size:13px;font-weight:700;margin:14px 0 6px;color:var(--ink)}
  .hint{font-size:11.5px;color:var(--muted);font-weight:400;margin-top:3px}
  input,textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:11px;font-family:inherit;font-size:14px;color:var(--ink);background:#fbfcfe}
  input:focus,textarea:focus{outline:none;border-color:var(--gold)}
  textarea{min-height:88px;resize:vertical;direction:ltr;text-align:left}
  input#tok{direction:ltr;text-align:left}
  .btn{margin-top:18px;width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(180deg,var(--gold),var(--gold-2));color:#fff;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.2px}
  .btn:disabled{opacity:.6;cursor:default}
  .row{display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap}
  .row a{font-size:12.5px;color:var(--gold-2);text-decoration:none;font-weight:600}
  #out{margin-top:16px;font-size:13px;min-height:20px}
  .line{padding:8px 11px;border-radius:9px;margin-bottom:6px;font-size:12.5px}
  .line.ok{background:#eaf6ef;color:var(--ok);border:1px solid #cdeadb}
  .line.er{background:#fbeceb;color:var(--err);border:1px solid #f3d2ce}
  .remember{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:400;margin-top:6px}
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <img src="/logo.png" alt="مجموعة الذيابي">
    <h1>إرسال دعوة تسجيل مورد</h1>
    <div class="sub">Supplier Registration Invitation</div>
  </div>
  <div class="body">
    <label>رمز الإرسال <span class="hint">(سرّي — يُحفظ في هذا المتصفّح فقط)</span></label>
    <input id="tok" type="password" placeholder="INVITE_TOKEN" autocomplete="off">
    <label class="remember"><input type="checkbox" id="rem" checked style="width:auto"> تذكّر الرمز على هذا الجهاز</label>

    <label>بريد المورد (أو عدة بُرد — واحد في كل سطر)</label>
    <textarea id="emails" placeholder="supplier@example.com&#10;supplier2@example.com"></textarea>

    <button class="btn" id="send" onclick="sendAll()">إرسال الدعوة</button>
    <div class="row"><a href="/supplier-invitation-bilingual.html" target="_blank">✉︎ معاينة شكل الدعوة</a></div>
    <div id="out"></div>
  </div>
</div>
<script>
  const $=id=>document.getElementById(id);
  try{ const t=localStorage.getItem('deyabi_invite_tok'); if(t)$('tok').value=t; }catch(e){}
  function out(html){ $('out').innerHTML=html; }
  function line(cls,txt){ return `<div class="line ${cls}">${txt}</div>`; }
  async function sendOne(email,token){
    const r=await fetch('/api/invite-supplier',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,token})});
    let j={}; try{ j=await r.json(); }catch(e){}
    return {ok:r.ok&&j.ok, email, detail:(j.detail||j.error||('HTTP '+r.status))};
  }
  async function sendAll(){
    const token=($('tok').value||'').trim();
    if(!token){ out(line('er','أدخل رمز الإرسال أولاً')); return; }
    try{ if($('rem').checked) localStorage.setItem('deyabi_invite_tok',token); else localStorage.removeItem('deyabi_invite_tok'); }catch(e){}
    const emails=[...new Set(($('emails').value||'').split(/[\n,;\s]+/).map(s=>s.trim().toLowerCase()).filter(Boolean))];
    if(!emails.length){ out(line('er','أدخل بريداً واحداً على الأقل')); return; }
    const btn=$('send'); btn.disabled=true; btn.textContent='جارٍ الإرسال…'; out('');
    let html='';
    for(const em of emails){
      const res=await sendOne(em,token);
      html += res.ok ? line('ok','✓ أُرسلت إلى '+em) : line('er','✕ '+em+' — '+res.detail);
      out(html);
    }
    btn.disabled=false; btn.textContent='إرسال الدعوة';
  }
</script>
</body>
</html>
