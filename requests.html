<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>بوابة طلبات الشراء — مجموعة الذيابي</title>
<link rel="icon" href="logo-mark.png">
<style>
  :root{
    --navy:#231F20; --gold:#C4A265; --gold-2:#9A7A45; --cream:#fbf9f3;
    --ink:#231F20; --muted:#6b6457; --line:#e3dcc6; --surface:#ffffff; --bg:#f4f0e7;
    --danger:#b13434; --ok:#1f7a55; --warn:#9A7A45; --info:#3a4f86; --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'NeoSansArabic','Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh}
  .hidden{display:none !important}
  .btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:10px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
  .btn:hover{border-color:var(--gold)}
  .btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:var(--navy);border-color:transparent}
  .btn-primary:hover{filter:brightness(1.07)}
  .btn-ghost{background:transparent}
  .btn-sm{padding:6px 11px;font-size:12.5px}
  .input,.select,textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--ink)}
  .input:focus,.select:focus,textarea:focus{outline:none;border-color:var(--gold)}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
  .req{color:var(--danger)}

  /* Login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(1200px 600px at 50% -10%,rgba(196,162,101,0.18),transparent),var(--bg)}
  .login-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:34px 30px;width:100%;max-width:400px;box-shadow:0 24px 60px -20px rgba(35,31,32,.35)}
  .login-logo{width:74px;height:74px;margin:0 auto 14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),var(--gold-2));border-radius:16px;box-shadow:0 8px 22px -8px rgba(196,162,101,.7)}
  .login-logo img{width:48px;height:48px;object-fit:contain}
  .login-title{text-align:center;font-size:20px;font-weight:700;margin-bottom:2px}
  .login-sub{text-align:center;font-size:12.5px;color:var(--muted);margin-bottom:22px}
  .field{margin-bottom:14px}
  .err{color:var(--danger);font-size:12.5px;margin-top:8px;min-height:16px}

  /* App shell */
  .topbar{background:var(--navy);color:#fff7e8;padding:12px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
  .topbar img{height:34px}
  .topbar .ttl{font-weight:700;font-size:15px}
  .topbar .who{margin-inline-start:auto;font-size:12.5px;color:#d8c7a4}
  .wrap{max-width:980px;margin:0 auto;padding:18px}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tab{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:8px 15px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit}
  .tab.active{background:var(--gold);color:var(--navy);border-color:var(--gold)}
  .tab .cnt{display:inline-block;min-width:18px;padding:0 5px;margin-inline-start:5px;border-radius:9px;background:var(--danger);color:#fff;font-size:10px;font-weight:700}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px}
  .sec-title{font-size:15px;font-weight:700;margin:2px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:14px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{background:var(--navy);color:#fff7e8;padding:8px 10px;text-align:start;font-size:12px;white-space:nowrap}
  tbody td{padding:7px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr:hover{background:rgba(196,162,101,.05)}
  .num{text-align:end;font-variant-numeric:tabular-nums}
  .center{text-align:center}
  .it-table input{padding:5px 7px;font-size:12.5px}
  .badge{display:inline-block;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid transparent}
  .badge.ok{background:rgba(31,122,85,.12);color:var(--ok);border-color:rgba(31,122,85,.25)}
  .badge.warn{background:rgba(196,162,101,.16);color:var(--warn);border-color:rgba(196,162,101,.32)}
  .badge.danger{background:rgba(155,44,44,.1);color:var(--danger);border-color:rgba(155,44,44,.25)}
  .badge.info{background:rgba(58,79,134,.1);color:var(--info);border-color:rgba(58,79,134,.22)}
  .badge.neutral{background:#efece4;color:#5a5346;border-color:var(--line)}
  .muted{color:var(--muted);font-size:12.5px}
  .words{font-size:12.5px;color:var(--muted);margin-top:8px}
  .empty{padding:50px 20px;text-align:center;color:var(--muted)}
  .empty .ic{font-size:34px;margin-bottom:8px}
  /* Stepper */
  .stepper{display:flex;flex-direction:column;gap:2px}
  .step{display:flex;align-items:flex-start;gap:12px;padding:8px 0;position:relative}
  .step:not(:last-child)::before{content:'';position:absolute;inset-inline-start:15px;top:34px;bottom:-2px;width:2px;background:var(--line)}
  .dot{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-size:13px;font-weight:700;border:2px solid var(--line);background:var(--surface);color:var(--muted);z-index:1}
  .step.done .dot{background:var(--ok);border-color:var(--ok);color:#fff}
  .step.active .dot{background:var(--gold);border-color:var(--gold);color:var(--navy)}
  .step.rej .dot{background:var(--danger);border-color:var(--danger);color:#fff}
  .step.ret .dot{background:var(--warn);border-color:var(--warn);color:#fff}
  .step .lbl{font-weight:600;font-size:13.5px}
  .step .sub{font-size:11.5px;color:var(--muted)}
  .toast{position:fixed;bottom:20px;inset-inline-start:50%;transform:translateX(50%);background:var(--navy);color:#fff7e8;padding:11px 18px;border-radius:10px;font-size:13.5px;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:100;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  .toast.ok{background:#1f5c40}.toast.err{background:#7c1d1d}
  .row-act{display:flex;gap:6px;flex-wrap:wrap}
  .ocr-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 14px;margin-bottom:16px;background:linear-gradient(135deg,rgba(196,162,101,.1),rgba(154,122,69,.05));border:1px dashed var(--gold);border-radius:10px}
  /* dashboard */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
  .kpi .kv{font-size:26px;font-weight:800;line-height:1}
  .kpi .kl{font-size:11.5px;color:var(--muted);margin-top:5px}
  .bar-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
  .bar-row:last-child{border-bottom:none}
  .bar-row .bl{flex:1;min-width:120px}
  .bar-row .bw{flex:2;height:8px;background:var(--cream);border-radius:5px;overflow:hidden}
  .bar-row .bf{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-2))}
  .now-bar{margin-top:12px;padding:10px 14px;border-radius:10px;font-size:13px;background:rgba(196,162,101,.12);border:1px solid var(--line);color:var(--ink)}
  .now-bar.ok{background:rgba(31,122,85,.1);border-color:rgba(31,122,85,.3)}
  .now-bar.rej{background:rgba(155,44,44,.08);border-color:rgba(155,44,44,.25)}
  .now-bar.ret{background:rgba(58,79,134,.08);border-color:rgba(58,79,134,.22)}
  /* settings */
  .subtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;border-bottom:1px solid var(--line);padding-bottom:10px}
  .subtab{background:transparent;border:1px solid transparent;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit}
  .subtab.active{background:var(--cream);color:var(--navy);border-color:var(--line)}
  .perms{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:8px}
  .pchk{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink);margin:0}
  .pchk input{width:auto}
  /* flowchart */
  .flowchart{display:flex;align-items:center;gap:0;flex-wrap:wrap;padding:6px 0}
  .fc-node{background:var(--cream);border:1.5px solid var(--gold);border-radius:10px;padding:8px 12px;text-align:center;min-width:110px}
  .fc-node.start{background:var(--navy);color:#fff7e8;border-color:var(--navy)}
  .fc-node.end{background:rgba(31,122,85,.12);border-color:var(--ok);color:var(--ok)}
  .fc-t{font-weight:700;font-size:12.5px}
  .fc-s{font-size:10.5px;color:var(--muted);margin-top:2px}
  .fc-node.start .fc-t,.fc-node.end .fc-t{font-size:12.5px}
  .fc-arrow{color:var(--gold-2);font-weight:800;padding:0 7px;font-size:17px}
  @media(max-width:640px){ .who{display:none} thead th,tbody td{padding:6px 6px;font-size:11.5px} }
</style>
</head>
<body>

<!-- ════ LOGIN ════ -->
<div id="login">
  <div class="login-card">
    <div class="login-logo"><img src="logo-mark.png" alt="" onerror="this.style.display='none'"></div>
    <div class="login-title">بوابة طلبات الشراء</div>
    <div class="login-sub">مجموعة الذيابي · ادخل بحسابك المخصّص</div>
    <div class="field"><label>اسم المستخدم</label><input class="input" id="lg-user" autocomplete="username" placeholder="اسم المستخدم"></div>
    <div class="field"><label>كلمة المرور</label><input class="input" id="lg-pass" type="password" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-primary" id="lg-btn" style="width:100%" onclick="doLogin()">دخول</button>
    <div class="err" id="lg-err"></div>
    <div class="muted" style="text-align:center;margin-top:14px;font-size:11.5px">للحصول على حساب، تواصل مع إدارة المشتريات.</div>
  </div>
</div>

<!-- ════ APP ════ -->
<div id="app" class="hidden">
  <div class="topbar">
    <img src="logo-mark.png" alt="" onerror="this.style.display='none'">
    <span class="ttl">بوابة طلبات الشراء</span>
    <span class="who" id="who"></span>
    <button class="btn btn-ghost btn-sm" style="color:#fff7e8;border-color:rgba(255,247,232,.3)" onclick="doLogout()">خروج</button>
  </div>
  <div class="wrap">
    <div class="tabs" id="tabs"></div>
    <div id="view"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ════════════ إعدادات الاتصال ════════════ */
const SUPABASE_URL='https://yofcaxvstjcrmbgciwym.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvZmNheHZzdGpjcm1iZ2Npd3ltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzUxNDMsImV4cCI6MjA5Mjk1MTE0M30.zL0qfSrOkxqJRgo1m3mWnp3jjXklvJ2l3u-jvuVbsJQ';
const AUTH_EMAIL_DOMAIN='aldeyabi.com';
// خريطة معرّفات الدخول الخاصة (تطابق النظام الأساسي) — لبعض الحسابات بريد مختلف عن username@aldeyabi.com
const AUTH_EMAIL_MAP={ abdullah:'abdullah@aldeyabi.com', mostafa:'supply@aldeyabi.com', mahmoud:'mahmoud@aldeyabi.com' };
const SUPA_CDNS=['/lib/supabase.min.js','https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js','https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js'];
const PRIORITIES=['عاجل','عالي','متوسط','منخفض'];
const STATUS_META={draft:{l:'مسودة',c:'neutral'},in_review:{l:'قيد الاعتماد',c:'warn'},returned:{l:'مُعاد للتعديل',c:'info'},approved:{l:'معتمد',c:'ok'},rejected:{l:'مرفوض',c:'danger'},rfq_issued:{l:'طلب تسعير صادر',c:'info'},converted_to_po:{l:'تحوّل لأمر شراء',c:'ok'},cancelled:{l:'ملغى',c:'danger'}};
const SECTORS=['المقاولات العامة','البنية التحتية','الإنشاءات','الصيانة والتشغيل','النقليات','الإدارة العامة'];

let SB=null, ME=null, DEPTS=[], RULES=[], VIEW='create', TRACK_ID=null, DRAFT=[], MYREQS=[];
let USERS=[], PSET={}, SET_TAB='workflow', RULE_DRAFT=null;
const PERM_DEFS=[
  {k:'can_verify_stock',l:'تدقيق المستودع'},
  {k:'can_approve_l1',l:'اعتماد مدير القسم/القطاع'},
  {k:'can_approve_l2',l:'اعتماد المدير العام'},
  {k:'can_manage_rfq',l:'مسؤول المشتريات'},
  {k:'can_manage_users',l:'إدارة البوابة (أدمن)'},
];
const RESOLVERS=[['dept_manager','مدير القسم/القطاع (تلقائي)'],['role','حسب الصلاحية']];
const ROLE_KEYS=[['can_verify_stock','أمين المستودع'],['can_approve_l1','مدير القسم'],['can_manage_rfq','مسؤول المشتريات'],['can_approve_l2','المدير العام']];

/* ════════════ أدوات ════════════ */
const $=id=>document.getElementById(id);
const val=id=>($(id)?$(id).value.trim():'');
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function num0(v){const n=Number(v);return isNaN(n)?0:n;}
function fmt(n){return n==null||isNaN(n)?'—':Number(n).toLocaleString('en-US',{maximumFractionDigits:2});}
function usernameToEmail(u){const k=String(u||'').trim().toLowerCase();return AUTH_EMAIL_MAP[k]||(k+'@'+AUTH_EMAIL_DOMAIN);}
function emailToUsername(email){const e=String(email||'').toLowerCase();for(const k in AUTH_EMAIL_MAP){if(AUTH_EMAIL_MAP[k].toLowerCase()===e)return k;}return e.split('@')[0];}
let _tt;
function toast(m,type){const t=$('toast');t.textContent=m;t.className='toast show '+(type||'');clearTimeout(_tt);_tt=setTimeout(()=>t.className='toast',2600);}
function can(key){return !!ME && (ME.role==='admin' || (ME.permissions||{})[key]===true);}
function isApprover(){return can('can_verify_stock')||can('can_approve_l1')||can('can_approve_l2')||can('can_manage_rfq');}
function isPortalAdmin(){return !!ME && (ME.role==='admin' || can('can_manage_users'));}
async function authHeader(){ try{ const {data}=await SB.auth.getSession(); const t=data&&data.session&&data.session.access_token; return t?{'Authorization':'Bearer '+t}:{}; }catch(e){ return {}; } }

/* تفقيط مبسّط */
function tafqit(amount){
  const n=Math.round((Number(amount)||0)*100)/100, r=Math.floor(n), h=Math.round((n-r)*100);
  let out=intWords(r); out=out?out+' ريال':'صفر ريال';
  if(h>0) out+=' و'+intWords(h)+' هللة';
  return out+' لا غير';
}
function intWords(num){
  num=Math.floor(Math.abs(Number(num)||0)); if(num===0) return '';
  const o=['','واحد','اثنان','ثلاثة','أربعة','خمسة','ستة','سبعة','ثمانية','تسعة','عشرة','أحد عشر','اثنا عشر','ثلاثة عشر','أربعة عشر','خمسة عشر','ستة عشر','سبعة عشر','ثمانية عشر','تسعة عشر'];
  const t=['','','عشرون','ثلاثون','أربعون','خمسون','ستون','سبعون','ثمانون','تسعون'];
  const hd=['','مئة','مئتان','ثلاثمئة','أربعمئة','خمسمئة','ستمئة','سبعمئة','ثمانمئة','تسعمئة'];
  function b(x){let p=[];const H=Math.floor(x/100),rem=x%100;if(H)p.push(hd[H]);if(rem){if(rem<20)p.push(o[rem]);else{const T=Math.floor(rem/10),O=rem%10;p.push(O?o[O]+' و'+t[T]:t[T]);}}return p.join(' و');}
  const sc=[{v:1e6,one:'مليون',two:'مليونان',many:'ملايين'},{v:1e3,one:'ألف',two:'ألفان',many:'آلاف'}];
  let p=[],rest=num;
  for(const s of sc){const c=Math.floor(rest/s.v);rest%=s.v;if(!c)continue;if(c===1)p.push(s.one);else if(c===2)p.push(s.two);else if(c<=10)p.push(b(c)+' '+s.many);else p.push(b(c)+' '+s.one);}
  if(rest)p.push(b(rest));
  return p.join(' و');
}

/* ════════════ تحميل المكتبة + الدخول ════════════ */
function loadLib(){
  if(window.supabase) return Promise.resolve();
  return new Promise((res,rej)=>{let i=0;const next=()=>{if(i>=SUPA_CDNS.length)return rej(new Error('تعذّر تحميل المكوّن — تحقّق من الاتصال'));const s=document.createElement('script');s.src=SUPA_CDNS[i++];s.onload=()=>window.supabase?res():next();s.onerror=next;document.head.appendChild(s);};next();});
}
async function doLogin(){
  const u=val('lg-user'), p=val('lg-pass');
  $('lg-err').textContent='';
  if(!u||!p){$('lg-err').textContent='أدخل اسم المستخدم وكلمة المرور';return;}
  const btn=$('lg-btn'); btn.disabled=true; btn.textContent='جارٍ الدخول...';
  try{
    await loadLib();
    if(!SB) SB=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{persistSession:true,autoRefreshToken:true}});
    const {error}=await SB.auth.signInWithPassword({email:usernameToEmail(u),password:p});
    if(error) throw new Error('بيانات الدخول غير صحيحة');
    await loadProfile(u.trim().toLowerCase());
    await afterLogin();
  }catch(e){ $('lg-err').textContent=e.message||'تعذّر الدخول'; }
  finally{ btn.disabled=false; btn.textContent='دخول'; }
}
async function loadProfile(username){
  let prof=null;
  try{
    // مطابقة غير حسّاسة لحالة الأحرف (يطابق نمط النظام الأساسي)
    const {data}=await SB.from('proc_users').select('*').ilike('username',username);
    prof=(data||[]).find(x=>String(x.username).toLowerCase()===String(username).toLowerCase()) || (data&&data[0]) || null;
  }catch(e){}
  ME = prof || {username, display_name:username, role:'user', permissions:{}};
  if(typeof ME.permissions==='string'){ try{ME.permissions=JSON.parse(ME.permissions);}catch(e){ME.permissions={};} }
}
async function loadRefs(){
  try{
    const [d,r]=await Promise.all([SB.from('proc_departments').select('*'),SB.from('proc_approval_rules').select('*').order('priority',{ascending:true})]);
    DEPTS=d.data||[]; RULES=(r.data||[]).filter(x=>x.active!==false);
  }catch(e){ DEPTS=[]; RULES=[]; }
}
async function afterLogin(){
  await loadRefs();
  if(isPortalAdmin()){ try{ await loadAdminData(); }catch(e){} }
  $('login').classList.add('hidden');
  $('app').classList.remove('hidden');
  $('who').textContent='مرحباً، '+(ME.display_name||ME.username);
  VIEW='create';
  render();
}
async function loadAdminData(){
  try{
    const u=await SB.from('proc_users').select('username,display_name,role,permissions,active').order('username');
    USERS=(u.data||[]).map(x=>{ if(typeof x.permissions==='string'){try{x.permissions=JSON.parse(x.permissions);}catch(e){x.permissions={};}} return x; });
  }catch(e){ USERS=[]; }
  try{ const s=await SB.from('proc_settings').select('value').eq('key','portal_settings').maybeSingle(); PSET=(s.data&&s.data.value)?(typeof s.data.value==='string'?JSON.parse(s.data.value):s.data.value):{}; }catch(e){ PSET={}; }
}
async function doLogout(){ try{ await SB.auth.signOut(); }catch(e){} location.reload(); }

/* استعادة الجلسة عند إعادة الفتح */
window.addEventListener('DOMContentLoaded', async ()=>{
  try{
    await loadLib();
    SB=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{persistSession:true,autoRefreshToken:true}});
    const {data}=await SB.auth.getSession();
    if(data && data.session){
      const email=data.session.user.email||'';
      const username=emailToUsername(email);
      await loadProfile(username);
      await afterLogin();
    }
  }catch(e){ /* ابقَ على شاشة الدخول */ }
});

/* ════════════ البيانات: تحميل طلباتي ════════════ */
async function loadMyReqs(){
  MYREQS=[];
  try{
    const PAGE=1000; let from=0, prs=[];
    while(true){
      let q=SB.from('proc_purchase_requests').select('*').order('created_at',{ascending:false});
      if(!isApprover()) q=q.eq('requester',ME.username);
      const {data,error}=await q.range(from,from+PAGE-1);
      if(error) throw error; if(!data||!data.length) break;
      prs=prs.concat(data); if(data.length<PAGE) break; from+=PAGE; if(from>50000) break;
    }
    const ids=prs.map(p=>p.id);
    let items=[], appr=[];
    if(ids.length){
      const [it,ap]=await Promise.all([
        SB.from('proc_pr_items').select('*').in('pr_id',ids),
        SB.from('proc_pr_approvals').select('*').in('pr_id',ids),
      ]);
      items=it.data||[]; appr=ap.data||[];
    }
    const bi={},ba={};
    items.forEach(x=>{(bi[x.pr_id]=bi[x.pr_id]||[]).push(x);});
    appr.forEach(x=>{(ba[x.pr_id]=ba[x.pr_id]||[]).push(x);});
    prs.forEach(p=>{p.items=(bi[p.id]||[]).sort((a,b)=>(a.seq||0)-(b.seq||0));p.approvals=(ba[p.id]||[]).sort((a,b)=>(a.seq||0)-(b.seq||0));});
    MYREQS=prs;
  }catch(e){ console.warn(e); }
}

/* ════════════ محرّك السلسلة ════════════ */
function matchRule(pr){
  const total=num0(pr.est_total);
  return [...RULES].sort((a,b)=>(a.priority??100)-(b.priority??100)).find(r=>{
    if(r.department_id && r.department_id!==pr.department_id) return false;
    if(r.category && r.category!==pr.title) return false;
    if(total<num0(r.min_total)) return false;
    if(r.max_total!=null && total>Number(r.max_total)) return false;
    return true;
  })||null;
}
function resolveApprover(pr,stage){
  if(stage.resolver==='dept_manager'){ const d=DEPTS.find(x=>x.id===pr.department_id); return d?(d.manager_user||null):null; }
  return null;
}
function currentStage(pr){ if(pr.status!=='in_review')return null; return (pr.approvals||[]).filter(a=>a.decision==='pending').sort((a,b)=>(a.seq||0)-(b.seq||0))[0]||null; }
function canActOn(pr){
  const st=currentStage(pr); if(!st) return null;
  if(pr.requester===ME.username) return null; // فصل المهام
  let ok=false;
  if(st.resolver==='dept_manager'){ const d=DEPTS.find(x=>x.id===pr.department_id); ok=(d&&d.manager_user===ME.username)||can('can_approve_l2'); }
  else { ok=!!st.role_key && can(st.role_key); }
  return ok?st:null;
}

/* ════════════ العرض ════════════ */
function render(){
  const inbox = MYREQS.filter(p=>p.status==='in_review' && canActOn(p));
  const tabs=[['create','➕ رفع طلب'],['mine','📋 طلباتي']];

  $('tabs').innerHTML = tabs.map(([k,l])=>`<button class="tab${VIEW===k?' active':''}" onclick="go('${k}')">${l}</button>`).join('')
    + `<button class="btn btn-ghost btn-sm" style="margin-inline-start:auto" onclick="refresh()">↻ تحديث</button>`;
  const v=$('view');

}
/* ════════════ التتبّع المتقدّم ولوحة المعلومات ════════════ */
function ageDays(pr){ const t=Date.parse(pr.updated_at||pr.created_at||''); return isNaN(t)?0:Math.max(0,Math.floor((Date.now()-t)/86400000)); }
function holderOf(pr){
  const st=currentStage(pr); if(!st) return '—';
  if(st.approver) return st.approver;
  if(st.resolver==='dept_manager'){ const d=DEPTS.find(x=>x.id===pr.department_id); return d&&d.manager_user?d.manager_user:'مدير القسم'; }
  const rk=(ROLE_KEYS.find(r=>r[0]===st.role_key)||[])[1]||st.role_key||'—';
  return 'حملة صلاحية: '+rk;
}
function dashHTML(){
  const all=MYREQS, by={}; all.forEach(p=>by[p.status]=(by[p.status]||0)+1);
  const inrev=all.filter(p=>p.status==='in_review'), sla=num0(PSET.sla_days)||3;
  const overdue=inrev.filter(p=>ageDays(p)>sla);
  const bn={}; inrev.forEach(p=>{const st=currentStage(p);const k=st?st.stage_label:'—';bn[k]=(bn[k]||0)+1;});
  const wh={}; inrev.forEach(p=>{const h=holderOf(p);wh[h]=(wh[h]||0)+1;});
  const kpi=(l,v,c)=>`<div class="kpi"><div class="kv" style="${c?`color:${c}`:''}">${v}</div><div class="kl">${esc(l)}</div></div>`;
  const barList=(obj)=>{const e=Object.entries(obj).sort((a,b)=>b[1]-a[1]);if(!e.length)return '<div class="muted">—</div>';const max=e[0][1]||1;return e.map(([k,v])=>`<div class="bar-row"><span class="bl">${esc(k)}</span><div class="bw"><div class="bf" style="width:${Math.round(v/max*100)}%"></div></div><b>${v}</b></div>`).join('');};
  const odRows=overdue.sort((a,b)=>ageDays(b)-ageDays(a)).slice(0,15).map(p=>`<div class="bar-row"><a class="bl" style="cursor:pointer;color:var(--gold-2)" onclick="goLoad('track','${esc(p.id)}')">${esc(p.id)} · ${esc(p.title||'')}</a><span class="badge ${ageDays(p)>sla*2?'danger':'warn'}">${ageDays(p)} يوم · ${esc(holderOf(p))}</span></div>`).join('')||'<div class="muted">لا متأخرات 👍</div>';
  return `
    <div class="kpis">
      ${kpi('إجمالي الطلبات',all.length)}
      ${kpi('قيد الاعتماد',inrev.length,'#9A7A45')}
      ${kpi('معتمد/تسعير',(by.approved||0)+(by.rfq_issued||0)+(by.converted_to_po||0),'#1f7a55')}
      ${kpi('مرفوض',by.rejected||0,'#b13434')}
      ${kpi('مُعاد للتعديل',by.returned||0,'#3a4f86')}
      ${kpi('متأخّر >'+sla+'ي',overdue.length,overdue.length?'#b13434':'#1f7a55')}
    </div>
    <div class="card"><div class="sec-title">🔧 الاختناقات — أين تتكدّس الطلبات</div>${barList(bn)}</div>
    <div class="card"><div class="sec-title">👤 على مَن تقف الطلبات الآن</div>${barList(wh)}</div>
    <div class="card"><div class="sec-title">⏱️ الطلبات المتأخّرة (الأطول انتظاراً)</div>${odRows}</div>`;
}

function collectItems(){ const b=$('it-body'); if(!b)return; b.querySelectorAll('tr[data-i]').forEach(tr=>{const i=+tr.getAttribute('data-i');if(!DRAFT[i])return;tr.querySelectorAll('[data-f]').forEach(inp=>DRAFT[i][inp.getAttribute('data-f')]=inp.value);}); }

async function nextPRNo(){
  const y=new Date().getFullYear();
  try{ const {data}=await SB.from('proc_purchase_requests').select('id').like('id','PR-DG'+y+'-%').order('id',{ascending:false}).limit(1);
    let max=0; if(data&&data[0]){const m=String(data[0].id).match(/(\d+)\s*$/);if(m)max=+m[1];}
    return 'PR-DG'+y+'-'+String(max+1).padStart(4,'0');
  }catch(e){ return 'PR-DG'+y+'-'+String(Date.now()).slice(-4); }
}
async function submitReq(){
  collectItems();
  const name=val('f-name'), deptId=val('f-dept'), mobile=val('f-mobile'), title=val('f-title');
  if(!name||!deptId||!mobile||!title){ toast('أكمل: الاسم، القسم، الجوال، نوع المواد','err'); return; }
  const items=DRAFT.filter(it=>(it.description||'').trim() && num0(it.requested_qty)>0);
  if(!items.length){ toast('أضف بنداً واحداً على الأقل بكمية مطلوبة','err'); return; }
  const dept=DEPTS.find(d=>d.id===deptId);
  const id=await nextPRNo();
  const total=0; // الأسعار تُضاف من المشتريات لاحقاً
  const pr={ id, title, department_id:deptId, department:dept?dept.name_ar:null,
    sector:val('f-sector')||null, project:val('f-project')||null,
    requester:ME.username, requester_name:name, requester_mobile:mobile,
    request_date:new Date().toISOString().slice(0,10), needed_by:val('f-needed')||null,
    priority:val('f-priority')||'متوسط', est_total:total, total_in_words:null, currency:'SAR',
    status:'in_review', current_seq:1, created_by:ME.username, created_at:new Date().toISOString() };
  try{
    const {error}=await SB.from('proc_purchase_requests').upsert(pr); if(error) throw error;
    const rows=items.map((it,i)=>({pr_id:id,seq:i+1,description:it.description,unit:it.unit||null,stock_balance:(it.stock_balance===''?null:num0(it.stock_balance)),requested_qty:num0(it.requested_qty)}));
    const ri=await SB.from('proc_pr_items').insert(rows); if(ri.error) throw ri.error;
    // بناء سلسلة الاعتماد
    const rule=matchRule(pr); const stages=(rule&&Array.isArray(rule.stages))?rule.stages:[];
    if(rule){ await SB.from('proc_purchase_requests').update({approval_rule_id:rule.id}).eq('id',id); }
    if(stages.length){
      const ar=stages.map(s=>({pr_id:id,seq:s.seq,stage_label:s.label,resolver:s.resolver,role_key:s.role_key,approver:resolveApprover(pr,s),decision:'pending'}));
      await SB.from('proc_pr_approvals').insert(ar);
    }
    toast('تم إرسال الطلب رقم '+id,'ok');
    notifyPR('submitted', id);
    notifyPR('pending', id);
    DRAFT=[];
    await goLoad('track',id);
  }catch(e){ toast('تعذّر الإرسال: '+(e.message||''),'err'); }
}

  let c='';
  if(action==='reject'||action==='return'){ c=prompt(action==='reject'?'سبب الرفض:':'سبب الإرجاع:',''); if(c===null)return; }
  else c=prompt('ملاحظة الاعتماد (اختياري):','')||'';
  act(id,action,c);
}
async function act(id,action,comment){
  const pr=MYREQS.find(p=>p.id===id); if(!pr){ toast('غير موجود','err'); return; }
  const stage=canActOn(pr); if(!stage){ toast('لست المعتمِد لهذه المرحلة','err'); return; }
  if(comment==null) comment=$('act-c')?$('act-c').value:'';
  if((action==='reject'||action==='return')&&!String(comment||'').trim()){ toast('اكتب السبب','err'); return; }
  const pending=(pr.approvals||[]).filter(a=>a.decision==='pending').sort((a,b)=>(a.seq||0)-(b.seq||0));
  const isLast=pending.length<=1;
  const decision=action==='approve'?'approved':action==='reject'?'rejected':'returned';
  let newStatus=pr.status,newSeq=pr.current_seq;
  if(action==='approve'){ if(isLast)newStatus='approved'; else newSeq=pending[1].seq; }
  else if(action==='reject') newStatus='rejected';
  else { newStatus='returned'; newSeq=0; }
  const now=new Date().toISOString();
  try{
    let e=(await SB.from('proc_pr_approvals').update({decision,approver:ME.username,comment:comment||null,acted_at:now}).eq('pr_id',id).eq('seq',stage.seq)).error; if(e)throw e;
    e=(await SB.from('proc_purchase_requests').update({status:newStatus,current_seq:newSeq,updated_at:now,updated_by:ME.username}).eq('id',id)).error; if(e)throw e;
    toast(action==='approve'?(isLast?'اعتُمد الطلب نهائياً':'اعتُمدت مرحلتك'):action==='reject'?'رُفض الطلب':'أُعيد للتعديل','ok');
    if(action==='approve'){ if(isLast) notifyPR('approved',id); else notifyPR('pending',id); }
    else if(action==='reject') notifyPR('rejected',id,comment);
    else notifyPR('returned',id,comment);
    await goLoad('inbox');
  }catch(err){ toast('تعذّر التنفيذ: '+(err.message||''),'err'); }
}

/* ════════════════════ OCR — قراءة النموذج بالذكاء (عبر /api/ai) ════════════════════ */
const OCR_MODEL='gemini-2.5-flash';
function normDate(v){ if(!v)return''; const s=String(v).trim(); let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); if(m)return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`; m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/); if(m)return `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`; return ''; }
async function ocrParse(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*,application/pdf';
  inp.onchange=async()=>{
    const f=inp.files[0]; if(!f)return;
    toast('جارٍ قراءة النموذج بالذكاء…');
    try{
      const b64=await new Promise((res,rej)=>{const rd=new FileReader();rd.onload=()=>res(String(rd.result).split(',')[1]);rd.onerror=rej;rd.readAsDataURL(f);});
      const prompt='هذا «نموذج طلب شراء مواد» لمجموعة الذيابي. استخرج بياناته وأعد JSON فقط (بلا أي شرح خارج الأقواس) بهذا الشكل:\n'
        +'{"requester_name":"اسم مُقدّم الطلب إن ظهر","title":"فئة/نوع المواد بعد عبارة (تأمين المواد الآتية)","department":"الإدارة","sector":"القطاع إن وُجد","project":"المشروع/الموقع إن وُجد","needed_by":"تاريخ التوريد المطلوب YYYY-MM-DD أو null","items":[{"description":"إسم الصنف","unit":"الوحدة","stock_balance":رقم أو null,"requested_qty":رقم}]}\n'
        +'أعمدة جدول النموذج: م | إسم الصنف | الوحدة | كمية العقد | رصيد مستودعى | الكمية المطلوبة | سعر الوحدة | إجمالي السعر. خذ requested_qty من عمود «الكمية المطلوبة». تجاهل صف الإجمالي وصفوف التواقيع. أرقام مجرّدة بلا فواصل آلاف.';
      const body={contents:[{role:'user',parts:[{text:prompt},{inline_data:{mime_type:f.type||'image/jpeg',data:b64}}]}],generationConfig:{temperature:0.1,maxOutputTokens:4096,thinkingConfig:{thinkingBudget:0}}};
      const r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:OCR_MODEL,action:'generateContent',body})});
      const data=await r.json().catch(()=>({}));
      if(!r.ok) throw new Error((data&&data.error&&data.error.message)||'تعذّر تشغيل الذكاء (تأكّد من ضبط GEMINI_API_KEY على الخادم)');
      let txt=(data&&data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&data.candidates[0].content.parts[0].text)||'';
      txt=txt.replace(/```(?:json)?/gi,'').trim();
      const a=txt.indexOf('{'),z=txt.lastIndexOf('}'); if(a<0||z<0) throw new Error('لم يُفهم رد الذكاء');
      ocrApply(JSON.parse(txt.slice(a,z+1)));
    }catch(e){ toast('فشل القراءة: '+(e.message||''),'err'); }
  };
  inp.click();
}
function ocrApply(o){
  const set=(id,v)=>{const el=$(id);if(el&&v!=null&&String(v)!=='')el.value=v;};
  set('f-name',o.requester_name); set('f-title',o.title); set('f-project',o.project); set('f-needed',normDate(o.needed_by));
  if(o.sector){const s=$('f-sector'); if(s&&[...s.options].some(x=>x.value===o.sector))s.value=o.sector;}
  if(o.department){const d=DEPTS.find(x=>(x.name_ar||'').trim()===String(o.department).trim()); const s=$('f-dept'); if(d&&s)s.value=d.id;}
  const items=Array.isArray(o.items)?o.items:[]; const clean=items.filter(it=>(it.description||'').toString().trim());
  if(clean.length){ DRAFT=clean.map(it=>({description:String(it.description||'').trim(),unit:it.unit||'',stock_balance:(it.stock_balance==null?'':it.stock_balance),requested_qty:(it.requested_qty==null?'':it.requested_qty)})); renderItems(); }
  toast('استُخرج '+clean.length+' بند — راجع البيانات قبل الإرسال','ok');
}

  const start='<div class="fc-node start">📝 مُقدّم الطلب</div>';
  const nodes=stages.sort((a,b)=>(a.seq||0)-(b.seq||0)).map(s=>{
    const rv=(RESOLVERS.find(r=>r[0]===s.resolver)||[])[1]||s.resolver;
    const rk=(ROLE_KEYS.find(r=>r[0]===s.role_key)||[])[1]||s.role_key||'';
    return `<div class="fc-arrow">→</div><div class="fc-node"><div class="fc-t">${esc(s.label||'')}</div><div class="fc-s">${esc(s.resolver==='role'?rk:rv)}</div></div>`;
  }).join('');
  const end='<div class="fc-arrow">→</div><div class="fc-node end">✅ معتمَد</div>';
  return `<div class="flowchart">${start}${nodes}${end}</div>`;
}

async function userPerm(username,key,on){
  const u=USERS.find(x=>x.username===username); if(!u)return; u.permissions=u.permissions||{}; u.permissions[key]=on;
  try{ const e=(await SB.from('proc_users').update({permissions:u.permissions}).eq('username',username)).error; if(e)throw e; toast('حُدّثت الصلاحية','ok'); }
  catch(e){ toast('تعذّر: '+(e.message||''),'err'); }
}
async function userReset(username){ const p=prompt('كلمة المرور الجديدة (6 أحرف على الأقل):',''); if(p===null)return; if(p.length<6){toast('قصيرة جداً','err');return;} try{ await adminApi({action:'setPassword',username,password:p}); toast('غُيّرت كلمة المرور','ok'); }catch(e){ toast('تعذّر: '+(e.message||''),'err'); } }
async function userActive(username,on){ try{ await adminApi({action:'setActive',username,active:on}); toast(on?'فُعّل':'عُطّل','ok'); await loadAdminData(); render(); }catch(e){ toast('تعذّر: '+(e.message||''),'err'); } }

/* ── عام ── */
function generalHTML(){
  return `<div class="card"><div class="sec-title">إعدادات عامّة</div>
    <div class="grid">
      <div><label>اسم المنظومة (يظهر في الترويسة)</label><input class="input" id="g-name" value="${esc(PSET.org_name||'مجموعة الذيابي')}"></div>
      <div><label>عتبة تأخّر التنبيه (أيام)</label><input class="input num" id="g-sla" value="${esc(PSET.sla_days??3)}"></div>
    </div>
    <div class="perms">
      <label class="pchk"><input type="checkbox" id="g-em" ${PSET.email_on!==false?'checked':''}> تفعيل إشعارات الإيميل</label>
      <label class="pchk"><input type="checkbox" id="g-wa" ${PSET.whatsapp_on?'checked':''} disabled> واتساب (يُفعّل بعد ربط المزوّد)</label>
    </div>
    <button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="saveGeneral()">💾 حفظ</button>
    <div class="muted" style="margin-top:10px">رابط البوابة: <b dir="ltr">/requests.html</b> · وزّعه على الموظفين والمعتمِدين.</div>
  </div>`;
}
async function saveGeneral(){
  PSET=Object.assign({},PSET,{org_name:val('g-name'),sla_days:num0(val('g-sla')),email_on:$('g-em')?$('g-em').checked:true});
  try{ const e=(await SB.from('proc_settings').upsert({key:'portal_settings',value:PSET,description:'إعدادات بوابة الطلبات',updated_by:ME.username,updated_at:new Date().toISOString()},{onConflict:'key'})).error; if(e)throw e; toast('حُفظت الإعدادات','ok'); }
  catch(e){ toast('تعذّر: '+(e.message||''),'err'); }
}
</script>
