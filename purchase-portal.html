/* ══════════════════════ دوال الأفعال — عبر RPC حقيقية ثم إعادة تحميل+عرض ══════════════════════ */
async function decide(reqId,action,comment){
  let cmt=comment, until=null;
  if(action==='defer' && comment && typeof comment==='object'){ until=comment.until||null; cmt=comment.reason||''; }
  let res; try{ res=await pa_rpc('portal_pr_transition',{p_request_id:reqId,p_action:action,p_comment:cmt||null,p_hold_until:until||null}); }catch(e){ return; }
  toast(action==='approve'?'تم الاعتماد':action==='reject'?'تم الرفض':action==='defer'?'أُجّل مالياً':'أُعيد للتعديل','ok');
  if(action==='approve') pa_notify('request',reqId,(res&&res.finalized)?'approved':'stage');
  else if(action==='reject') pa_notify('request',reqId,'rejected',cmt);
  else if(action==='return') pa_notify('request',reqId,'returned',cmt);
  await pa_after(reqId);
}
async function submitRequest(){
  NR_META.title=($('nr-title')||{}).value||NR_META.title;
  NR_META.project=($('nr-project')||{}).value||NR_META.project;
  NR_META.needBy=($('nr-needby')||{}).value||NR_META.needBy;
  NR_META.note=($('nr-note')||{}).value||NR_META.note;
  NR_META.justif=($('nr-justif')||{}).value||NR_META.justif;
  const items=NR_ITEMS.filter(it=>(it.desc||'').trim()&&(+it.qty>0));
  if(!(NR_META.title||'').trim()){ toast('اكتب وصف الطلب','err'); return; }
  if(!(NR_META.project||'').trim()){ toast('اسم المشروع مطلوب','err'); return; }
  if(!(NR_META.needBy||'').trim()){ toast('تاريخ التوريد المطلوب مطلوب','err'); return; }
  if(!items.length){ toast('أضف صنفاً واحداً على الأقل باسم وكمية','err'); return; }
  if(NR_META.procType && NR_META.procType!=='normal' && !(NR_META.justif||'').trim()){ toast('التبرير مطلوب لهذا النوع من الشراء','err'); return; }
  const deptId=userDept(ME);
  let res;
  try{ res=await pa_rpc('portal_create_request',{
    p_title:NR_META.title.trim(), p_department_id:deptId||null, p_priority:NR_META.priority||'متوسط',
    p_items:items.map(it=>({desc:(it.desc||'').trim(),unit:it.unit||'حبة',qty:+it.qty,price:+it.price||0})),
    p_project:(NR_META.project||'').trim(), p_need_by:NR_META.needBy||null, p_proc_type:NR_META.procType||'normal',
    p_justification:(NR_META.justif||'').trim()||null, p_note:(NR_META.note||'').trim()||null }); }catch(e){ return; }
  toast('رُفع الطلب '+((res&&res.id)||'')+((res&&res.split_flag)?' — مع تنبيه تجزئة ⚠':' ✦'),(res&&res.split_flag)?'err':'ok');
  if(res&&res.id) pa_notify('request',res.id,'submitted');
  nrReset();
  await loadAll(); if(res&&res.id){ CURRENT=res.id; VIEW='detail'; } else { VIEW='pipeline'; CURRENT=null; } render();
}

async function awardTo(id,sid,reason){
  const r=REQS.find(x=>x.id===id); if(!r||!r.proc){ return; }
  const offerId=r.proc._offerIdByKey && r.proc._offerIdByKey[sid];
  if(offerId==null){ toast('عرض غير معروف','err'); return; }
  try{ await pa_rpc('portal_award',{p_request_id:id,p_winner_offer_id:offerId,p_reason:reason||null}); }catch(e){ return; }
  toast(reason?'عُمّد المورّد مع توثيق المبرّر':'بدأت سلسلة اعتماد التعميد','ok'); pa_notify('award',id,'pending'); await pa_after(id);
}
async function approveAward(id){
  let res; try{ res=await pa_rpc('portal_award_transition',{p_request_id:id,p_action:'approve',p_comment:null}); }catch(e){ return; }
  toast('اعتُمدت مرحلة التعميد','ok'); pa_notify('award',id,(res&&res.status==='awarded')?'approved':'pending'); await pa_after(id);
}
async function confirmPayment(id){
  const r=REQS.find(x=>x.id===id); if(!r||!r.proc){ return; }
  const sub=r.proc.winnerTotal||0; const amount=sub+Math.round(sub*(PSET.vat/100));
  let details={}, custodyTo=null; const kind=PM_TYPE;
  if(kind==='bank'){ const ib=(($('pm-iban')||{}).value||'').replace(/\s+/g,'').toUpperCase();
    if(!/^SA\d{22}$/.test(ib)){ toast('آيبان غير صحيح — الصيغة: SA + 22 رقماً','err'); return; }
    const acc=(($('pm-acc')||{}).value||'').trim(); if(!acc){ toast('اسم الحساب مطلوب','err'); return; }
    details={account_name:acc,iban:ib,bank_name:($('pm-bank')||{}).value||''}; }
  else if(kind==='custody'){ custodyTo=($('pm-cust')||{}).value||''; if(!custodyTo){ toast('حدّد مسؤول العهدة','err'); return; } }
  else { const due=($('pm-due')||{}).value||''; if(!due){ toast('تاريخ الاستحقاق مطلوب','err'); return; } details={due_date:due,terms:($('pm-terms')||{}).value||''}; }
  try{ await pa_rpc('portal_payment_request',{p_request_id:id,p_kind:kind,p_amount:amount,p_custody_to:custodyTo||null,p_details:Object.keys(details).length?details:null}); }catch(e){ return; }
  closeModal(); toast('صدر طلب الصرف وأُحيل للإدارة المالية ✓','ok'); pa_notify('payment',id,'pending'); await pa_after(id);
}
async function payApprove(id){

  try{ await pa_rpc('portal_payment_transition',{p_payment_id:pid,p_action:'approve',p_comment:null}); }catch(e){ return; }
  toast('اعتُمد الصرف — نفّذ التحويل ثم انقر «تم الصرف»','ok'); pa_notify('payment',id,'approved'); await pa_after(id);
}

async function confirmPayReturn(id){
  /* إجراء «إرجاع» مستقل: يعيد الطلب لحالة awarded ليُعيد المشتريات إصدار الصرف، مع حفظ الوجهة. */
  const r=REQS.find(x=>x.id===id); const pid=r&&r.proc&&r.proc.payment&&r.proc.payment._id;
  const reason=($('payret-reason')||{}).value||''; const to=($('payret-to')||{}).value||'procurement';

  closeModal(); toast('أُعيد طلب الصرف مع الملاحظة — يمكن للمشتريات إصدار طلب جديد','ok'); pa_notify('payment',id,'returned',reason.trim()); await pa_after(id);
}

async function confirmReceive(id){

  const lines=[]; r.items.forEach((it,i)=>{ const add=+(($('rv-'+i)||{}).value)||0; if(add>0) lines.push({item_id:it._id,qty:add}); });
  if(!lines.length){ toast('أدخِل كمية مستلمة واحدة على الأقل','err'); return; }
  let res; try{ res=await pa_rpc('portal_record_receipt',{p_request_id:id,p_lines:lines,p_note:null}); }catch(e){ return; }
  closeModal(); toast((res&&res.remaining>0)?'سُجّل استلام جزئي — يمكن استكماله لاحقاً':'سُجّل الاستلام الكامل ✦','ok'); pa_notify('receipt',id,(res&&res.remaining>0)?'recorded':'closed'); await pa_after(id);
}
async function closeReq(id){

/* ══════ اعتماد أمر الشراء (portal_po_transition) — سلسلة حسب شريحة القيمة ══════ */
function pa_canApprovePo(s){
  if(isAdmin()) return true;
  var perms=(USERS[ME]||{}).perms||{};
  if(s.kind==='committee') return !!(perms.can_approve_committee || (PA_COMMITTEE&&PA_COMMITTEE.indexOf(ME)>=0));
  return !!perms[s.roleKey];
}
function poReviewPanel(r){
  var p=r.proc; if(!p||!p.poChain) return '';
  var rows=p.poChain.map(function(s,i){
    var done=s.decision==='approved';
    var active=!done && s.decision==='pending' && p.poChain.slice(0,i).every(function(x){return x.decision==='approved';});
    var canAct=active && pa_canApprovePo(s);
    var right = done ? '<span class="badge ok" style="font-size:10px">معتمد</span>'
      : active ? (canAct
          ? '<button class="btn btn-gold btn-sm" onclick="poApprove(\''+r.id+'\')">'+ic('check',13)+' اعتماد</button> <button class="btn btn-danger btn-sm" onclick="askPoReject(\''+r.id+'\')">'+ic('x',13)+' رفض</button>'
          : '<span class="chip">'+ic('eye',12)+' بانتظار '+esc(uName(s.user||''))+'</span>')
      : '<span class="chip">بالانتظار</span>';
    return '<div class="par-row"><div class="av sm" style="background:'+(done?'linear-gradient(155deg,#36916b,#2e7d5b)':active?'linear-gradient(155deg,#c2a063,#a37f43)':'#cdc4b2')+';color:#fff">'+(done?'✓':s.seq)+'</div><div class="nm" style="flex:1">'+esc(s.label)+'<div class="rl muted" style="font-size:10.5px;font-weight:500">'+esc(uName(s.user||''))+'</div></div>'+right+'</div>';
  }).join('');
  return '<div class="card" style="margin-bottom:16px;border-color:var(--gold-soft)"><div class="sec-title"><span class="ico">'+ic('clipboard',16)+'</span>اعتماد أمر الشراء — سلسلة حسب القيمة</div>'
    + '<div class="muted" style="font-size:11.5px;margin-bottom:10px">'+ic('scale',13)+' تكبر السلسلة بقيمة التعميد: اللجنة (>25 ألف) ← المالية (>150) ← المدير العام (>250).</div>'
    + rows + '</div>' + (poPreview(r)||'');
}

/* تنبيه مركز المهام: اعتماد أمر شراء معلّق للمعتمِد المخوَّل */
var _pa_refMyTasks = myTasks;
myTasks = function(){
  var t = _pa_refMyTasks() || [];
  (REQS||[]).forEach(function(r){
    if(r && r.proc && r.proc.phase==='po_review' && r.proc.poChain && r.requester!==ME){
      var idx=-1; for(var i=0;i<r.proc.poChain.length;i++){ if(r.proc.poChain[i].decision==='pending'){ idx=i; break; } }
      if(idx>=0){ var s=r.proc.poChain[idx];
        var active = r.proc.poChain.slice(0,idx).every(function(x){return x.decision==='approved';});
        if(active && pa_canApprovePo(s)) t.push({ r:r, label:'اعتماد أمر شراء بانتظارك', ic:'clipboard', sub:s.label||'' });
      }
    }
    /* استلام منتظر: يُوجَّه لحامل can_verify_stock (المستودع) لا للمقدّم — canReceive يطابق الخادم */
    if(r && r.proc && r.proc.phase==='receipt' && typeof canReceive==='function' && canReceive(r)){
      var already=t.some(function(x){return x.r===r && x.ic==='box';});
      if(!already) t.push({ r:r, label:'استلام منتظر', ic:'box', sub:'تسجيل استلام البنود' });
    }
  });
  return t;
};

/* ══════ الإرجاع المرن (توجيه المالك): اختيار مَن يعود له الطلب من المشاركين السابقين ══════ */
/* قائمة الوجهات: مقدّم الطلب (seq 0) + كل مرحلة اعتماد سابقة اعتُمدت فعلاً (seq>0). */
function pa_returnTargets(r){
  var cur=curStage(r); var curSeq=cur?(cur.seq||0):0; var out=[];
  out.push({seq:0,label:'مقدّم الطلب — '+uName(r.requester||r.requesterName||'')});
  (r.chain||[]).forEach(function(s){
    if((s.seq||0)>0 && (s.seq||0)<curSeq && s.decision==='approved'){
      out.push({seq:s.seq,label:esc(s.label)+(s.actor?(' — '+uName(s.actor)):'')});
    }
  });
  return out;
}
askReason = function(id,action){
  var r=REQS.find(function(x){return x.id===id;}); var isRej=action==='reject';
  var targetSel='';
  if(!isRej){
    var tg=pa_returnTargets(r);
    var opts=tg.map(function(t){return '<option value="'+t.seq+'">'+t.label+'</option>';}).join('');
    targetSel='<label style="margin-top:10px">إلى مَن يعود الطلب؟</label>'
      +'<select class="select" id="return-to">'+opts+'</select>'
      +'<div class="muted" style="font-size:11px;margin-top:4px">'+ic('info',12)+' المرحلة التي يعود إليها الطلب — ومن يستلمه يمكنه إرجاعه لمن سبقه أيضاً.</div>';
  }
  $('modal').innerHTML='<div class="modal-head"><div class="mi '+(isRej?'danger':'info')+'">'+ic(isRej?'x':'undo',22)+'</div><div><h3>'+(isRej?'رفض الطلب':'إرجاع الطلب للتعديل')+'</h3><div class="ms">'+(isRej?'سيُنهى الطلب نهائياً':'سيعود الطلب للمرحلة التي تختارها')+'</div></div></div>'
    +'<div class="modal-body">'
    +'<div class="mini-req"><div class="r"><span class="l">رقم الطلب</span><b dir="ltr">'+esc(r.id)+'</b></div><div class="r"><span class="l">الوصف</span><b>'+esc(r.title)+'</b></div><div class="r"><span class="l">القيمة</span><b>'+money(r.estTotal)+'</b></div><div class="r"><span class="l">المرحلة</span><b>'+esc(curStage(r).label)+'</b></div></div>'
    +'<label>'+(isRej?'سبب الرفض':'سبب الإرجاع وما المطلوب تعديله')+' <span style="color:var(--danger)">*</span></label>'
    +'<textarea id="reason" rows="3" placeholder="'+(isRej?'وضّح سبب الرفض...':'وضّح ما يلزم تعديله...')+'"></textarea>'
    +targetSel
    +'<div class="modal-foot"><button class="btn '+(isRej?'btn-danger':'btn-primary')+'" onclick="confirmReason(\''+id+'\',\''+action+'\')">'+ic(isRej?'x':'undo',15)+' تأكيد '+(isRej?'الرفض':'الإرجاع')+'</button><button class="btn btn-ghost" onclick="closeModal()">إلغاء</button></div>'
    +'</div>';
  $('overlay').classList.add('show'); setTimeout(function(){ var e=$('reason'); if(e)e.focus(); },60);
};
confirmReason = function(id,action){
  var c=(($('reason')||{}).value||'').trim();
  if(!c){ var e=$('reason'); if(e)e.style.borderColor='var(--danger)'; toast('السبب مطلوب','err'); return; }
  var toSeq=0; if(action==='return'){ var sel=$('return-to'); if(sel) toSeq=parseInt(sel.value,10)||0; }
  closeModal(); decide(id,action,c,toSeq);
};
/* تمديد decide لتمرير وجهة الإرجاع (p_return_to_seq) */
decide = async function(reqId,action,comment,returnToSeq){
  var cmt=comment, until=null;
  if(action==='defer' && comment && typeof comment==='object'){ until=comment.until||null; cmt=comment.reason||''; }
  var res; try{ res=await pa_rpc('portal_pr_transition',{p_request_id:reqId,p_action:action,p_comment:cmt||null,p_hold_until:until||null,p_return_to_seq:(returnToSeq||0)}); }catch(e){ return; }
  toast(action==='approve'?'تم الاعتماد':action==='reject'?'تم الرفض':action==='defer'?'أُجّل مالياً':'أُعيد للتعديل','ok');
  if(action==='approve') pa_notify('request',reqId,(res&&res.finalized)?'approved':'stage');
  else if(action==='reject') pa_notify('request',reqId,'rejected',cmt);
  /* إرجاع مرن لمرحلة سابقة: الحالة تبقى in_review فالحدث الصحيح 'stage' (يُخطر معتمِد
     المرحلة المُعاد إليها بأزرار قراره)؛ 'returned' فقط عند العودة للمقدّم (seq=0). */
  else if(action==='return') pa_notify('request',reqId,(returnToSeq&&returnToSeq>0)?'stage':'returned',cmt);
  await pa_after(reqId);
};

/* م4: حفظ «المفوَّض عند الغياب» فعلياً (كان نسخة توضيحية بالذاكرة تضيع عند التحديث) */

};

var PA_INVITES=null, PA_WL=[], PA_DOMAIN='aldeyabi.com', PA_INV_LOADING=false;
async function pa_apiPost(path, body){
  var sess=(await SB.auth.getSession()).data.session; if(!sess){ toast('انتهت الجلسة','err'); return null; }
  var r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+sess.access_token},body:JSON.stringify(body)});
  var d=null; try{ d=await r.json(); }catch(e){}
  if(!r.ok || !(d&&d.ok)){ toast((d&&d.error)||'تعذّرت العملية','err'); return null; }
  return d;
}

togglePerm = async function(k,pk,on){
  var u=USERS[k]; if(!u) return;
  var real=PA_PERM_MAP[pk]||pk;
  var perms=Object.assign({},u.perms||{});
  PA_PERM_ALIASES.forEach(function(a){ delete perms[a]; });   /* لا تُحفَظ مفاتيح العرض */
  if(on) perms[real]=true; else delete perms[real];
  var d=await pa_apiPost('/api/portal-users',{action:'setProfile',username:k,permissions:perms});
  if(d){
    u.perms=perms;
    u.perms.can_approve_l1=!!perms.can_approve_stage; u.perms.can_approve_l2=!!perms.can_manage_users;
    u.perms.can_manage_rfq=!!perms.can_manage_procurement;
    delete u.acc; toast('حُفظت الصلاحية','ok');
  }
  render();
};

/* ══════ م2: طباعة مضغوطة — كل مستند في صفحة A4 واحدة (مقيسة بـChromium PDF) ══════
   تُحقن كـ<style> كي تبقى منطقة التصميم 1–2555 دون مساس. لا تغيّر عرض الشاشة إطلاقاً.
   السبب الجذري المقيس: هوامش/أحجام المرجع تفيض قليلاً عن A4 + هامش margin-top على
   محضر المقارنة يفتح صفحة ثانية تحت page-break-inside:avoid + جداول عريضة تُرقّم أفقياً. */
(function(){
  var css = ''
  +'@media print{'
  +'@page{size:A4;margin:8mm 9mm 11mm}'
  +'#print-root .doc{font-size:10.5px;page-break-inside:avoid;margin:0 !important}'
  +'#print-root .doc-accent{display:none}'
  +'#print-root .doc-head{padding:8px 16px 7px;gap:10px}'
  +'#print-root .doc-logo-full{height:40px}'
  +'#print-root .doc-idblock .kind{font-size:11px;padding:3px 10px;margin-bottom:4px}'
  +'#print-root .doc-idblock .kind-en{font-size:7.5px}'
  +'#print-root .doc-idblock .row{font-size:9.5px;margin-top:2px}'
  +'#print-root .doc-regbar{padding:3px 16px;font-size:8.5px}'
  +'#print-root .doc-body{padding:9px 16px 8px}'
  +'#print-root .doc-body::before{background-size:44%}'
  +'#print-root .doc-meta{margin-bottom:8px;border-radius:8px}'
  +'#print-root .doc-meta .m{padding:4px 9px}'
  +'#print-root .doc-meta .m .l{font-size:8px}'
  +'#print-root .doc-meta .m .v{font-size:10.5px;margin-top:1px}'
  +'#print-root .doc-sech{font-size:9.5px;margin:0 0 5px}'
  +'#print-root .doc table{font-size:9.5px;width:100% !important;table-layout:fixed}'
  +'#print-root .doc th{min-width:0 !important}'
  +'#print-root .doc th,#print-root .doc td{word-wrap:break-word;overflow-wrap:break-word}'
  +'#print-root .doc [style*="overflow-x"]{overflow:visible !important}'
  +'#print-root .doc table th{padding:4px 7px;font-size:8.5px}'
  +'#print-root .doc table td{padding:3px 7px}'
  +'#print-root .doc-words{font-size:9.5px;margin:6px 0;padding:5px 9px}'
  +'#print-root .parties{gap:8px;margin-bottom:8px}'
  +'#print-root .party{padding:7px 10px;font-size:9.5px;border-radius:8px}'
  +'#print-root .doc-terms{margin-top:6px}'
  +'#print-root .doc-terms ol{margin:2px 0 0;padding-inline-start:15px}'
  +'#print-root .doc-terms ol li{font-size:8.5px;line-height:1.55;margin:0 0 1px}'
  +'#print-root .aplog{margin:6px 0}'
  +'#print-root .aplog .row,#print-root .aplog td{font-size:9px;padding:2px 6px}'
  +'#print-root .doc-sign{margin-top:10px;gap:8px}'
  +'#print-root .doc-sign .s{padding-top:8px}'
  +'#print-root .doc-sign .who{font-size:8.5px}'
  +'#print-root .doc-sign .line{min-height:16px;font-size:10px;padding-top:5px}'
  +'#print-root .doc-sign .sub{font-size:7.5px}'
  +'#print-root .doc-foot{margin-top:7px;padding-top:5px;font-size:7.5px}'
  +'#print-root .doc-stamp{font-size:26px;padding:4px 16px}'
  +'#print-root .badge{font-size:8px !important;padding:1px 6px}'
  +'.p-footer{bottom:3mm;font-size:7.5px;padding:3px 9mm 0}'
  +'}';
  var st=document.createElement('style'); st.id='pa-print-compact'; st.textContent=css;
  document.head.appendChild(st);
})();

/* الإقلاع الفعلي */
boot();
</script>
