<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تفعيل الحساب — بوابة طلبات الشراء | مجموعة الذيابي</title>
<style>
  :root{ --navy:#16243d; --gold:#c2a063; --bg:#f2f4f8; --line:#e2e7ef; --muted:#5d6b80; --danger:#c0392b; --ok:#2e7d5b; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Segoe UI',Tahoma,Arial,sans-serif; background:var(--bg); color:#1f2937; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card{ width:100%; max-width:440px; background:#fff; border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 18px 50px -22px rgba(11,27,54,.4); }
  .head{ background:linear-gradient(135deg,var(--navy),#22355a); padding:26px 28px; text-align:center; }
  .head .k{ color:#E9D9B4; font-size:11px; letter-spacing:.09em; text-transform:uppercase; }
  .head .t{ color:#fff; font-size:19px; font-weight:800; margin-top:8px; }
  .bar{ height:3px; background:var(--gold); }
  .body{ padding:26px 28px; }
  label{ display:block; font-size:13px; font-weight:600; margin:14px 0 6px; color:#374151; }
  input{ width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:11px; font-size:15px; font-family:inherit; }
  input:focus{ outline:none; border-color:var(--gold); }
  .ro{ background:#f7f9fc; color:var(--muted); }
  .btn{ width:100%; margin-top:20px; padding:13px; background:var(--navy); color:#fff; border:0; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .btn:disabled{ opacity:.55; cursor:default; }
  .msg{ margin-top:14px; font-size:13px; padding:11px 13px; border-radius:10px; display:none; line-height:1.7; }
  .msg.err{ display:block; background:#fdecea; color:var(--danger); }
  .msg.ok{ display:block; background:#e7f6ee; color:var(--ok); }
  .hint{ font-size:11.5px; color:var(--muted); margin-top:6px; }
  .foot{ text-align:center; font-size:11px; color:var(--muted); padding:14px; border-top:1px solid var(--line); }
  a{ color:var(--navy); }
</style>
</head>
<body>
  <div class="card">
    <div class="head"><div class="k">AL-DEYABI GROUP · مجموعة الذيابي</div><div class="t">تفعيل حساب بوابة الشراء</div></div>
    <div class="bar"></div>
    <div class="body">
      <div id="loading" style="text-align:center;color:var(--muted);padding:18px 0">جارٍ التحقّق من الدعوة…</div>
      <form id="form" style="display:none">
        <label>الاسم</label>
        <input id="name" class="ro" readonly>
        <label>البريد الإلكتروني</label>
        <input id="email" class="ro" readonly dir="ltr">
        <label>كلمة المرور</label>
        <input id="pw" type="password" autocomplete="new-password" placeholder="8 أحرف على الأقل">
        <label>تأكيد كلمة المرور</label>
        <input id="pw2" type="password" autocomplete="new-password" placeholder="أعد كتابة كلمة المرور">
        <div class="hint">اختر كلمة مرور قوية — ستستخدمها لتسجيل الدخول للبوابة.</div>
        <button class="btn" id="submit" type="submit">تفعيل الحساب</button>
      </form>
      <div id="msg" class="msg"></div>
    </div>
    <div class="foot">مجموعة الذيابي · بوابة طلبات الشراء</div>
  </div>
<script>
  var token = new URLSearchParams(location.search).get('token') || '';
  var $ = function(id){ return document.getElementById(id); };
  function show(kind, text){ var m=$('msg'); m.className='msg '+kind; m.textContent=text; }

  async function init(){
    if(!token){ $('loading').style.display='none'; show('err','رابط الدعوة غير صالح — لا يوجد رمز.'); return; }
    try{
      var r = await fetch('/api/portal-register?token='+encodeURIComponent(token));
      var d = await r.json();
      if(!r.ok || !d.ok){ $('loading').style.display='none'; show('err', d.error || 'تعذّر التحقّق من الدعوة.'); return; }
      $('name').value = d.displayName || '';
      $('email').value = d.email || '';
      $('loading').style.display='none';
      $('form').style.display='block';
    }catch(e){ $('loading').style.display='none'; show('err','تعذّر الاتصال بالخادم.'); }
  }

  $('form').addEventListener('submit', async function(ev){
    ev.preventDefault();
    var pw=$('pw').value, pw2=$('pw2').value;
    if(pw.length < 8){ show('err','كلمة المرور 8 أحرف على الأقل.'); return; }
    if(pw !== pw2){ show('err','كلمتا المرور غير متطابقتين.'); return; }
    $('submit').disabled=true; show('ok','جارٍ التفعيل…');
    try{
      var r = await fetch('/api/portal-register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token: token, password: pw }) });
      var d = await r.json();
      if(!r.ok || !d.ok){ show('err', d.error || 'تعذّر التفعيل.'); $('submit').disabled=false; return; }
      show('ok','تم تفعيل حسابك بنجاح ✦ سيُنقل لتسجيل الدخول…');
      setTimeout(function(){ location.href='/portal'; }, 1800);
    }catch(e){ show('err','تعذّر الاتصال بالخادم.'); $('submit').disabled=false; }
  });

  init();
</script>
</body>
</html>
